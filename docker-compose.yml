version: "3.8"

services:
  # PostgreSQL para desarrollo local
  postgres:
    image: postgres:16-alpine
    container_name: auditaseo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auditaseo
      POSTGRES_PASSWORD: auditaseo123
      POSTGRES_DB: auditaseo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis para BullMQ en desarrollo local
  redis:
    image: redis:7-alpine
    container_name: auditaseo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
